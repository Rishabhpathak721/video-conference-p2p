<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Conference</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; min-height: 100dvh; overflow: hidden; }

  /* ── Join Screen ─────────────────────────────── */
  #joinScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; padding: 20px; }
  #joinScreen.hidden { display: none; }
  .join-card { background: #1e293b; border-radius: 20px; padding: 36px; width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,.5); }
  .join-card h1 { font-size: 24px; margin-bottom: 4px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .join-card .subtitle { color: #64748b; font-size: 14px; margin-bottom: 24px; }
  .join-card label { display: block; font-size: 12px; color: #64748b; margin-bottom: 5px; margin-top: 14px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  .join-card input { width: 100%; padding: 11px 14px; border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: #e2e8f0; font-size: 15px; outline: none; transition: border .2s; }
  .join-card input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }

  .preview-wrap { border-radius: 14px; overflow: hidden; background: #000; aspect-ratio: 16/9; position: relative; }
  .preview-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); }
  .preview-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #1a1a2e; }
  .preview-placeholder svg { width: 48px; height: 48px; color: #475569; }

  .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-green { margin-top: 14px; background: linear-gradient(135deg, #059669, #10b981); color: white; }
  .btn-green:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,.3); }
  .btn-primary { margin-top: 18px; background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.3); }
  #joinStatus { margin-top: 10px; font-size: 13px; color: #64748b; min-height: 18px; text-align: center; }
  #joinStatus.error { color: #f87171; }

  /* ── Meeting Screen ──────────────────────────── */
  #meetingScreen { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
  #meetingScreen.active { display: flex; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #1e293b; border-bottom: 1px solid #1e293b; flex-shrink: 0; }
  .top-bar .room-info { display: flex; align-items: center; gap: 10px; }
  .room-badge { background: #334155; padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .peer-badge { color: #64748b; font-size: 13px; }

  .main-area { flex: 1; display: flex; overflow: hidden; }

  /* ── Video Grid ──────────────────────────────── */
  .video-grid { flex: 1; display: grid; gap: 8px; padding: 8px; overflow: hidden;
    grid-template-columns: 1fr; align-content: center; justify-items: center; }
  .video-grid.g2 { grid-template-columns: 1fr 1fr; }
  .video-grid.g3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .video-grid.g4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

  .video-tile { position: relative; background: #1e293b; border-radius: 14px; overflow: hidden; width: 100%; aspect-ratio: 16/9; max-height: 100%; }
  .video-tile video { width: 100%; height: 100%; object-fit: cover; display: block; background: #000; }
  .video-tile.local video { transform: scaleX(-1); }
  .video-tile .name-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
  .video-tile .name-tag svg { width: 12px; height: 12px; flex-shrink: 0; }
  .video-tile .name-tag .mic-off-icon { color: #f87171; }

  .cam-off-overlay { position: absolute; inset: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .cam-off-overlay .avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: white; }
  .cam-off-overlay .cam-name { color: #94a3b8; font-size: 13px; }

  /* ── Controls Bar ────────────────────────────── */
  .controls { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px; background: #1e293b; flex-shrink: 0; }
  .ctrl-btn { width: 48px; height: 48px; border-radius: 14px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; position: relative; }
  .ctrl-btn svg { width: 22px; height: 22px; }
  .ctrl-btn.on { background: #334155; color: #e2e8f0; }
  .ctrl-btn.on:hover { background: #475569; }
  .ctrl-btn.off { background: #dc2626; color: white; }
  .ctrl-btn.off:hover { background: #b91c1c; }
  .ctrl-btn.chat-btn { background: #334155; color: #e2e8f0; }
  .ctrl-btn.chat-btn:hover { background: #475569; }
  .ctrl-btn.chat-btn.has-unread::after { content: ""; position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; }
  .ctrl-btn.leave { background: #dc2626; color: white; border-radius: 14px; width: auto; padding: 0 20px; gap: 6px; font-size: 14px; font-weight: 600; }
  .ctrl-btn.leave:hover { background: #b91c1c; }

  /* ── Chat Panel ──────────────────────────────── */
  .chat-panel { width: 0; overflow: hidden; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; transition: width .25s ease; flex-shrink: 0; }
  .chat-panel.open { width: 320px; }
  .chat-header { padding: 14px 16px; font-weight: 600; font-size: 15px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .chat-header button { background: none; border: none; color: #64748b; cursor: pointer; padding: 4px; border-radius: 6px; display: flex; }
  .chat-header button:hover { background: #334155; color: #e2e8f0; }
  .chat-header button svg { width: 18px; height: 18px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .chat-msg { margin-bottom: 14px; }
  .chat-msg .msg-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
  .chat-msg .msg-name { font-size: 13px; font-weight: 600; color: #3b82f6; }
  .chat-msg .msg-time { font-size: 11px; color: #475569; }
  .chat-msg .msg-body { font-size: 14px; color: #cbd5e1; line-height: 1.4; }
  .chat-msg.system .msg-body { color: #64748b; font-style: italic; font-size: 13px; }
  .chat-input-wrap { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #334155; flex-shrink: 0; }
  .chat-input-wrap input { flex: 1; padding: 9px 12px; border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: #e2e8f0; font-size: 14px; outline: none; }
  .chat-input-wrap input:focus { border-color: #3b82f6; }
  .chat-send-btn { padding: 9px 14px; border: none; border-radius: 10px; background: #3b82f6; color: white; cursor: pointer; display: flex; align-items: center; }
  .chat-send-btn:hover { background: #2563eb; }
  .chat-send-btn svg { width: 18px; height: 18px; }

  @media (max-width: 640px) {
    .chat-panel.open { width: 100%; position: absolute; inset: 0; z-index: 20; }
    .video-grid.g2 { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- ═══════════ JOIN SCREEN ═══════════ -->
<div id="joinScreen">
  <div class="join-card">
    <h1>Video Conference</h1>
    <p class="subtitle">Join a room to start a video call.</p>
    <div class="preview-wrap">
      <video id="previewVideo" autoplay playsinline muted></video>
      <div class="preview-placeholder" id="previewPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
      </div>
    </div>
    <button class="btn btn-green" id="cameraBtn" onclick="startCamera()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25z"/></svg>
      Start Camera
    </button>
    <label for="nameInput">Your Name</label>
    <input id="nameInput" type="text" placeholder="Enter your name" />
    <label for="roomInput">Room ID</label>
    <input id="roomInput" type="text" placeholder="room1" value="room1" />
    <button class="btn btn-primary" id="joinBtn" onclick="joinRoom()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
      Join Room
    </button>
    <div id="joinStatus"></div>
  </div>
</div>

<!-- ═══════════ MEETING SCREEN ═══════════ -->
<div id="meetingScreen">
  <div class="top-bar">
    <div class="room-info">
      <span class="room-badge" id="roomLabel">room1</span>
      <span class="peer-badge" id="peerCount">1 participant</span>
    </div>
  </div>
  <div class="main-area">
    <div class="video-grid" id="videoGrid">
      <div class="video-tile local" id="localTile">
        <video id="localVideo" autoplay playsinline muted></video>
        <span class="name-tag" id="localLabel">You</span>
      </div>
    </div>
    <div class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <span>Chat</span>
        <button onclick="toggleChat()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-wrap">
        <input id="chatInput" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="chat-send-btn" onclick="sendChat()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg></button>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="ctrl-btn on" id="micBtn" onclick="toggleMic()" title="Microphone">
      <svg id="micIconOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 003-3V4.5a3 3 0 10-6 0v8.25a3 3 0 003 3z"/></svg>
      <svg id="micIconOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 003-3V4.5a3 3 0 10-6 0v8.25a3 3 0 003 3z"/><line x1="3" y1="3" x2="21" y2="21" stroke-width="2.5" stroke="currentColor"/></svg>
    </button>
    <button class="ctrl-btn on" id="camBtn" onclick="toggleCam()" title="Camera">
      <svg id="camIconOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25z"/></svg>
      <svg id="camIconOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25z"/><line x1="2" y1="2" x2="22" y2="22" stroke-width="2.5" stroke="currentColor"/></svg>
    </button>
    <button class="ctrl-btn chat-btn" id="chatBtn" onclick="toggleChat()" title="Chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/></svg>
    </button>
    <button class="ctrl-btn leave" onclick="leaveRoom()" title="Leave">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
      Leave
    </button>
  </div>
</div>

<script>
// ═══════════ CONFIG ═══════════
const ICE_SERVERS = [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" },
  { urls: "stun:stun2.l.google.com:19302" },
];

// ═══════════ STATE ═══════════
let ws = null, localStream = null, myPeerId = "", myName = "", roomId = "";
let micOn = true, camOn = true, chatOpen = false, unreadChat = 0;
const peers = new Map(); // peerId → { pc, displayName, micOn, camOn }

const $ = id => document.getElementById(id);

// ═══════════ SOUND EFFECTS (Web Audio) ═══════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

function playTone(freq, duration, type = "sine", vol = 0.15) {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + duration);
}

function soundJoin() { playTone(880, 0.15); setTimeout(() => playTone(1100, 0.2), 120); }
function soundLeave() { playTone(600, 0.15); setTimeout(() => playTone(440, 0.25), 120); }
function soundMessage() { playTone(1200, 0.08, "sine", 0.1); setTimeout(() => playTone(1500, 0.1, "sine", 0.08), 80); }

// ═══════════ HELPERS ═══════════
function setStatus(msg, err) {
  const el = $("joinStatus"); el.textContent = msg; el.className = err ? "error" : "";
}

function updateGrid() {
  const n = peers.size + 1;
  const g = $("videoGrid");
  g.className = "video-grid" + (n === 2 ? " g2" : n === 3 ? " g3" : n >= 4 ? " g4" : "");
  $("peerCount").textContent = `${n} participant${n !== 1 ? "s" : ""}`;
}

function sendMsg(msg) { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg)); }

function getInitials(name) { return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2); }

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

// ═══════════ CAMERA ═══════════
window.startCamera = async function() {
  $("cameraBtn").disabled = true;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    $("previewVideo").srcObject = localStream;
    $("previewPlaceholder").style.display = "none";
    $("cameraBtn").style.display = "none";
    $("joinBtn").disabled = false;
    setStatus("Camera ready");
  } catch (e) {
    setStatus("Camera failed: " + e.message, true);
    $("cameraBtn").disabled = false;
  }
};

// ═══════════ CHAT ═══════════
function addChatMsg(name, body, ts, isSystem) {
  const wrap = document.createElement("div");
  wrap.className = "chat-msg" + (isSystem ? " system" : "");
  if (!isSystem) {
    wrap.innerHTML = `<div class="msg-head"><span class="msg-name">${name}</span><span class="msg-time">${formatTime(ts)}</span></div><div class="msg-body">${body}</div>`;
  } else {
    wrap.innerHTML = `<div class="msg-body">${body}</div>`;
  }
  $("chatMessages").appendChild(wrap);
  $("chatMessages").scrollTop = $("chatMessages").scrollHeight;
}

window.toggleChat = function() {
  chatOpen = !chatOpen;
  $("chatPanel").classList.toggle("open", chatOpen);
  if (chatOpen) { unreadChat = 0; $("chatBtn").classList.remove("has-unread"); $("chatInput").focus(); }
};

window.sendChat = function() {
  const input = $("chatInput");
  const body = input.value.trim();
  if (!body) return;
  sendMsg({ type: "chat", body });
  addChatMsg(myName + " (You)", body, Date.now(), false);
  input.value = "";
};

// ═══════════ MEDIA STATE UI ═══════════
function updateTileMediaState(peerId, mic, cam, displayName) {
  const tile = $(`tile-${peerId}`);
  if (!tile) return;

  // Camera-off overlay
  let overlay = tile.querySelector(".cam-off-overlay");
  if (!cam) {
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.className = "cam-off-overlay";
      overlay.innerHTML = `<div class="avatar">${getInitials(displayName)}</div><div class="cam-name">${displayName}</div>`;
      tile.appendChild(overlay);
    }
  } else if (overlay) {
    overlay.remove();
  }

  // Mic icon in name tag
  const tag = tile.querySelector(".name-tag");
  if (tag) {
    const existing = tag.querySelector(".mic-off-icon");
    if (!mic && !existing) {
      const icon = document.createElement("span");
      icon.className = "mic-off-icon";
      icon.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 003-3V4.5a3 3 0 10-6 0v8.25a3 3 0 003 3z"/><line x1="3" y1="3" x2="21" y2="21" stroke-width="2.5"/></svg>`;
      tag.prepend(icon);
    } else if (mic && existing) {
      existing.remove();
    }
  }
}

// ═══════════ JOIN / LEAVE ═══════════
window.joinRoom = async function() {
  if (!localStream) { setStatus("Start camera first", true); return; }
  myName = $("nameInput").value.trim() || "Guest";
  roomId = $("roomInput").value.trim() || "room1";
  myPeerId = "p_" + Math.random().toString(36).slice(2, 8);

  $("joinBtn").disabled = true;
  setStatus("Connecting...");

  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    sendMsg({ type: "join", roomId, peerId: myPeerId, displayName: myName });
    $("joinScreen").classList.add("hidden");
    $("meetingScreen").classList.add("active");
    $("localVideo").srcObject = localStream;
    $("localLabel").textContent = myName + " (You)";
    $("roomLabel").textContent = roomId;
    updateGrid();
    addChatMsg(null, "You joined the meeting", Date.now(), true);
  };

  ws.onmessage = async (ev) => {
    const msg = JSON.parse(ev.data);
    switch (msg.type) {
      case "room-peers":
        for (const p of msg.peers) await createPeer(p.peerId, p.displayName, true, p.micOn, p.camOn);
        break;
      case "peer-joined":
        await createPeer(msg.peerId, msg.displayName, false, true, true);
        soundJoin();
        addChatMsg(null, `${msg.displayName} joined`, Date.now(), true);
        break;
      case "peer-left":
        removePeer(msg.peerId);
        soundLeave();
        break;
      case "offer": await handleOffer(msg.from, msg.sdp); break;
      case "answer": await handleAnswer(msg.from, msg.sdp); break;
      case "ice-candidate": await handleIceCandidate(msg.from, msg.candidate); break;
      case "chat":
        addChatMsg(msg.displayName, msg.body, msg.ts, false);
        soundMessage();
        if (!chatOpen) { unreadChat++; $("chatBtn").classList.add("has-unread"); }
        break;
      case "media-state": {
        const peer = peers.get(msg.peerId);
        if (peer) {
          peer.micOn = msg.micOn;
          peer.camOn = msg.camOn;
          updateTileMediaState(msg.peerId, msg.micOn, msg.camOn, peer.displayName);
        }
        break;
      }
    }
  };

  ws.onerror = () => setStatus("Connection error", true);
  ws.onclose = () => {};
};

window.leaveRoom = function() {
  for (const [pid] of peers) removePeer(pid);
  ws?.close(); ws = null;
  chatOpen = false; unreadChat = 0;
  $("chatPanel").classList.remove("open");
  $("chatBtn").classList.remove("has-unread");
  $("chatMessages").innerHTML = "";
  $("meetingScreen").classList.remove("active");
  $("joinScreen").classList.remove("hidden");
  $("joinBtn").disabled = false;
  $("cameraBtn").style.display = "";
  $("cameraBtn").disabled = false;
  $("previewVideo").srcObject = localStream;
  $("previewPlaceholder").style.display = "none";
  setStatus("");
};

// ═══════════ MIC / CAM ═══════════
window.toggleMic = function() {
  micOn = !micOn;
  localStream?.getAudioTracks().forEach(t => t.enabled = micOn);
  $("micBtn").className = "ctrl-btn " + (micOn ? "on" : "off");
  $("micIconOn").style.display = micOn ? "" : "none";
  $("micIconOff").style.display = micOn ? "none" : "";
  sendMsg({ type: "media-state", micOn, camOn });
};

window.toggleCam = function() {
  camOn = !camOn;
  localStream?.getVideoTracks().forEach(t => t.enabled = camOn);
  $("camBtn").className = "ctrl-btn " + (camOn ? "on" : "off");
  $("camIconOn").style.display = camOn ? "" : "none";
  $("camIconOff").style.display = camOn ? "none" : "";
  sendMsg({ type: "media-state", micOn, camOn });

  // Local tile camera-off overlay
  let overlay = $("localTile").querySelector(".cam-off-overlay");
  if (!camOn) {
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.className = "cam-off-overlay";
      overlay.innerHTML = `<div class="avatar">${getInitials(myName)}</div><div class="cam-name">${myName}</div>`;
      $("localTile").appendChild(overlay);
    }
  } else if (overlay) {
    overlay.remove();
  }
};

// ═══════════ WEBRTC P2P ═══════════
async function createPeer(peerId, displayName, initiator, peerMicOn = true, peerCamOn = true) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  peers.set(peerId, { pc, displayName, micOn: peerMicOn, camOn: peerCamOn });

  for (const track of localStream.getTracks()) pc.addTrack(track, localStream);

  const remoteStream = new MediaStream();
  pc.ontrack = (ev) => {
    remoteStream.addTrack(ev.track);
    const vid = $(`vid-${peerId}`);
    if (vid) { vid.srcObject = remoteStream; vid.play().catch(() => {}); }
  };

  pc.onicecandidate = (ev) => {
    if (ev.candidate) sendMsg({ type: "ice-candidate", to: peerId, candidate: ev.candidate });
  };

  // Build tile
  const tile = document.createElement("div");
  tile.className = "video-tile";
  tile.id = `tile-${peerId}`;
  const vid = document.createElement("video");
  vid.id = `vid-${peerId}`;
  vid.autoplay = true; vid.playsInline = true;
  vid.srcObject = remoteStream;
  tile.appendChild(vid);
  const tag = document.createElement("span");
  tag.className = "name-tag";
  tag.textContent = displayName;
  tile.appendChild(tag);
  $("videoGrid").appendChild(tile);
  updateGrid();

  updateTileMediaState(peerId, peerMicOn, peerCamOn, displayName);

  if (initiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    sendMsg({ type: "offer", to: peerId, sdp: pc.localDescription });
  }
}

async function handleOffer(from, sdp) {
  const peer = peers.get(from);
  if (!peer) return;
  await peer.pc.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer = await peer.pc.createAnswer();
  await peer.pc.setLocalDescription(answer);
  sendMsg({ type: "answer", to: from, sdp: peer.pc.localDescription });
}

async function handleAnswer(from, sdp) {
  const peer = peers.get(from);
  if (!peer) return;
  await peer.pc.setRemoteDescription(new RTCSessionDescription(sdp));
}

async function handleIceCandidate(from, candidate) {
  const peer = peers.get(from);
  if (!peer) return;
  try { await peer.pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
}

function removePeer(peerId) {
  const peer = peers.get(peerId);
  if (peer) {
    addChatMsg(null, `${peer.displayName} left`, Date.now(), true);
    peer.pc.close();
    peers.delete(peerId);
  }
  const tile = $(`tile-${peerId}`);
  if (tile) tile.remove();
  updateGrid();
}
</script>
